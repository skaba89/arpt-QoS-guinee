# ONIT-PNG — Docker Compose pour tests locaux
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: "3.9"

services:
  onit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onit-png-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/onit-png.db
      - NEXTAUTH_SECRET=onit-png-secret-key-2026-guinee-docker
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - onit-data:/app/data
      - ./test-data:/app/test-data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Caddy reverse proxy (matches existing Caddyfile)
  onit-caddy:
    image: caddy:2-alpine
    container_name: onit-png-caddy
    ports:
      - "81:81"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      onit-app:
        condition: service_healthy
    profiles:
      - with-caddy

volumes:
  onit-data:
    driver: local

# ═══════════════════════════════════════════════════════════
# ONIT-PNG — Docker Compose Configuration
# Observatoire National Intelligent des Télécommunications
# République de Guinée — ARPT
# ═══════════════════════════════════════════════════════════

version: "3.9"

services:
  onit-png:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onit-png
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/onit-png.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # SECURITY: NEXTAUTH_SECRET MUST be set — no default fallback!
      # Generate with: openssl rand -base64 32
      # Set in .env.docker or pass via environment: NEXTAUTH_SECRET=your-secret-here
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required. Generate one with: openssl rand -base64 32}
      - PORT=3000
    volumes:
      - onit-db:/app/db
      - ./test-data:/app/test-data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - onit-network

  # Optional: Caddy reverse proxy (matches existing Caddyfile)
  onit-caddy:
    image: caddy:2-alpine
    container_name: onit-png-caddy
    ports:
      - "81:81"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      onit-png:
        condition: service_healthy
    profiles:
      - with-caddy
    networks:
      - onit-network

volumes:
  onit-db:
    driver: local

networks:
  onit-network:
    driver: bridge
